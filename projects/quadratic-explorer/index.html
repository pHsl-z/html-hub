<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>二次函数图像探索</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #FDFBF6; font-family: -apple-system, 'Inter', sans-serif; color: #1B1B1B; }
    .panel { width: min(720px, 92vw); background: #fff; border-radius: 18px; padding: 20px; box-shadow: 0 12px 40px rgba(31,58,46,0.12); }
    h1 { font-family: Georgia, serif; margin: 0 0 6px; font-size: 22px; }
    p { margin: 0 0 12px; color: #5B5B5B; font-size: 13px; }
    canvas { width: 100%; aspect-ratio: 1; max-height: 380px; display: block; border: 1px solid #ECE6DC; border-radius: 12px; background: #FAF7F2; }
    .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 12px; }
    label { display: flex; flex-direction: column; font-size: 12px; color: #5B5B5B; gap: 4px; }
    input[type=range] { width: 100%; accent-color: #1F3A2E; }
    .val { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: #1F3A2E; }
  </style>
</head>
<body>
  <div class="panel">
    <h1>二次函数 y = ax² + bx + c</h1>
    <p>拖动滑块观察 <em>a, b, c</em> 三个参数对抛物线开口、位置和方向的影响。</p>
    <canvas id="cv" width="600" height="600"></canvas>
    <div class="row">
      <label>a = <span class="val" id="va">1.0</span><input id="a" type="range" min="-3" max="3" step="0.1" value="1"></label>
      <label>b = <span class="val" id="vb">0.0</span><input id="b" type="range" min="-5" max="5" step="0.1" value="0"></label>
      <label>c = <span class="val" id="vc">0.0</span><input id="c" type="range" min="-5" max="5" step="0.1" value="0"></label>
    </div>
  </div>
  <script>
    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height;
    const SCALE = 40;
    function toCanvas(x, y) { return [W/2 + x * SCALE, H/2 - y * SCALE]; }
    function drawGrid() {
      ctx.fillStyle = '#FAF7F2'; ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = '#ECE6DC'; ctx.lineWidth = 1;
      for (let i = -8; i <= 8; i++) {
        ctx.beginPath(); ctx.moveTo(...toCanvas(i, 0)); ctx.lineTo(...toCanvas(i, 16)); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(...toCanvas(-8, i)); ctx.lineTo(...toCanvas(8, i)); ctx.stroke();
      }
      ctx.strokeStyle = '#1B1B1B'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
    }
    function drawParabola(a, b, c) {
      ctx.strokeStyle = '#B5651D'; ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (let px = -8; px <= 8; px += 0.05) {
        const y = a * px * px + b * px + c;
        const [cx, cy] = toCanvas(px, y);
        if (px === -8) ctx.moveTo(cx, cy); else ctx.lineTo(cx, cy);
      }
      ctx.stroke();
      // 顶点
      const vx = -b / (2 * a);
      const vy = a * vx * vx + b * vx + c;
      if (Math.abs(a) > 0.01) {
        const [cx, cy] = toCanvas(vx, vy);
        ctx.fillStyle = '#1F3A2E';
        ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#5B5B5B';
        ctx.font = '12px JetBrains Mono';
        ctx.fillText(`(${vx.toFixed(2)}, ${vy.toFixed(2)})`, cx + 8, cy - 8);
      }
    }
    function loop() {
      const a = +document.getElementById('a').value;
      const b = +document.getElementById('b').value;
      const c = +document.getElementById('c').value;
      document.getElementById('va').textContent = a.toFixed(1);
      document.getElementById('vb').textContent = b.toFixed(1);
      document.getElementById('vc').textContent = c.toFixed(1);
      drawGrid();
      drawParabola(a, b, c);
    }
    ['a','b','c'].forEach(id => document.getElementById(id).oninput = loop);
    loop();
  </script>
</body>
</html>
