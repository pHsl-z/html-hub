<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>打地鼠</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #1F3A2E; font-family: -apple-system, 'Inter', sans-serif; color: #FAF7F2; }
    .stage { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 24px; }
    h1 { font-family: Georgia, serif; font-size: 26px; margin: 0; letter-spacing: 1px; }
    .hud { display: flex; gap: 24px; font-family: 'JetBrains Mono', monospace; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(3, 80px); grid-template-rows: repeat(3, 80px); gap: 12px; }
    .hole {
      width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle at 50% 100%, #0F2317 0%, #16301F 60%, #1F3A2E 100%);
      box-shadow: inset 0 8px 12px rgba(0,0,0,0.4);
      position: relative; cursor: pointer; overflow: hidden;
      border: 2px solid rgba(244,201,93,0.15);
      transition: transform 0.06s ease;
    }
    .hole:active { transform: scale(0.95); }
    .mole {
      position: absolute; left: 50%; bottom: -100%;
      width: 56px; height: 56px; transform: translateX(-50%);
      background: #B5651D; border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
      transition: bottom 0.18s ease;
      box-shadow: 0 6px 16px rgba(0,0,0,0.4);
    }
    .mole::before, .mole::after {
      content: ''; position: absolute; top: 30%; width: 8px; height: 8px; background: #FAF7F2; border-radius: 50%;
    }
    .mole::before { left: 22%; }
    .mole::after { right: 22%; }
    .hole.up .mole { bottom: 6px; }
    .hole.hit { animation: shake 0.18s; }
    .hole.hit .mole { bottom: -100%; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
    .btn {
      background: #F4C95D; color: #1F3A2E; border: 0; padding: 10px 22px;
      border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 13px;
    }
    .btn:hover { transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="stage">
    <h1>🐹 打地鼠</h1>
    <div class="hud">
      <span>分数: <strong id="score">0</strong></span>
      <span>剩余: <strong id="time">30</strong>s</span>
    </div>
    <div class="grid" id="grid"></div>
    <button class="btn" id="start">开始游戏</button>
  </div>
  <script>
    const grid = document.getElementById('grid');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const startBtn = document.getElementById('start');
    const holes = [];
    for (let i = 0; i < 9; i++) {
      const h = document.createElement('div');
      h.className = 'hole';
      const m = document.createElement('div'); m.className = 'mole';
      h.appendChild(m);
      h.onclick = () => {
        if (h.classList.contains('up')) {
          score += 1;
          scoreEl.textContent = score;
          h.classList.add('hit');
          setTimeout(() => h.classList.remove('hit', 'up'), 200);
        }
      };
      grid.appendChild(h);
      holes.push(h);
    }
    let score = 0, time = 30, timerId, popId, running = false;
    function reset() { score = 0; time = 30; scoreEl.textContent = '0'; timeEl.textContent = '30'; holes.forEach(h => h.classList.remove('up', 'hit')); }
    function start() {
      reset();
      running = true;
      startBtn.textContent = '重新开始';
      timerId = setInterval(() => { time -= 1; timeEl.textContent = time; if (time <= 0) end(); }, 1000);
      pop();
    }
    function pop() {
      if (!running) return;
      const h = holes[Math.floor(Math.random() * holes.length)];
      h.classList.add('up');
      setTimeout(() => h.classList.remove('up'), 800 + Math.random() * 400);
      popId = setTimeout(pop, 600 + Math.random() * 600);
    }
    function end() {
      running = false;
      clearInterval(timerId); clearTimeout(popId);
      startBtn.textContent = '再来一局';
      alert(`游戏结束！得分：${score}`);
    }
    startBtn.onclick = start;
  </script>
</body>
</html>
